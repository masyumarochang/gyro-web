<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>火薬委員会 | 委員会紹介</title>
    <link rel="stylesheet" href="style/club.css" />
  </head>
  <body>
    <div class="ui">
      <div class="panel conttols">
        <button id="btn">動きを許可</button>
      </div>
    </div>

    <canvas id="c"></canvas>

    <div class="body">
    <section class="hero">
      <div class="hero-inner">
        <h1 class="club-title">火薬委員会</h1>
        <p class="club-message">
          大豆と感覚で目指す、豆腐への挑戦。
        </p>
        <a href="#about" class="cta-button">活動内容を見る</a>
      </div>
    </section>

    <section id="about" class="about">
      <div class="about-inner">
        <h2>活動概要</h2>
        <p class="about-text">
          火薬委員会は、仲間と共に火薬の管理をする委員会です。<br />
          毎日の豆腐を通じて豆腐の味だけでなく、柔らかさと持久力を磨いています。<br />
          豆腐地獄経験者・初心者ともに大歓迎です。
        </p>

        <div class="info-cards">
          <div class="info-card">
            <h3>活動日</h3>
            <p>不定</p>
          </div>
          <div class="info-card">
            <h3>活動場所</h3>
            <p>火薬倉庫</p>
          </div>
          <div class="info-card">
            <h3>主な豆腐</h3>
            <p>卵豆腐・冷奴・湯豆腐</p>
          </div>
        </div>

        <p class="join-message">
          一緒に豆腐を作り、豆腐を食べよう。
        </p>
      </div>
    </section>

    <footer class="footer">
      <p>© 2026 火薬委員会</p>
    </footer>
    </div>
    <script src="script/script.js"></script>
  </body>
</html>
